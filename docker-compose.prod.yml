# Docker Compose para ambiente de produção
# Este arquivo é utilizado para configurar os serviços que compõem a aplicação em um ambiente de produção
# Roda apenas quando o usuário especifica "docker-compose -f docker-compose.yml -f docker-compose.prod.yml up"

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
      - ./nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - apigo_network